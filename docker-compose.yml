services:
  mongodb:
    container_name: noteblockworld-mongodb-dev
    image: mongo
    volumes:
      - mongodb_data:/data/db
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_PASSWORD=noteblockworldpassword
      - MONGO_INITDB_DATABASE=noteblockworld
      - MONGO_INITDB_ROOT_USERNAME=noteblockworlduser
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '-u',
          'noteblockworlduser',
          '-p',
          'noteblockworldpassword',
          '--authenticationDatabase',
          'admin',
          '--eval',
          "db.adminCommand('ping').ok",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  maildev:
    container_name: noteblockworld-maildev-dev
    image: maildev/maildev
    # Image HEALTHCHECK can report unhealthy and block `compose up --wait`, so
    # `docker:minio-init` never runs and MinIO buckets are never created.
    healthcheck:
      disable: true
    ports:
      - '1080:1080' # Web Interface
      - '1025:1025' # SMTP Server
      # to use the maildev container, you need to set the following environment variables in your application:
      # MAIL_TRANSPORT=smtp://maildev:1025 or MAIL_TRANSPORT=smtp://localhost:1025
      # MAIL_FROM="Example <noreply@noteblock.world>"
      #
      # You can also use the maildev web interface to view sent emails at http://localhost:1080

  minio:
    container_name: minio
    image: minio/minio
    command: server /data --console-address :9001
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # You can access the MinIO web interface at http://localhost:9000
    # You can access the MinIO console at http://localhost:9001

  # One-shot: exits 0 after buckets/CORS. Not part of `up --wait` (that waits for long-running services).
  mc:
    container_name: minio-client
    profiles:
      - minio-init
    image: minio/mc
    entrypoint: ['/bin/sh', '-c']
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: >
      -c '
      while ! mc alias set minio http://minio:9000 minioadmin minioadmin; do
        echo "Waiting for MinIO to be available..."
        sleep 2
      done &&
      mc mb minio/noteblockworld-songs || true &&
      mc mb minio/noteblockworld-thumbs || true &&
      mc policy set public minio/noteblockworld-songs &&
      mc policy set public minio/noteblockworld-thumbs &&
      mc admin config set minio api "cors_allow_origin=* cors_allow_methods=GET,PUT,POST,DELETE,HEAD,OPTIONS cors_allow_headers=*" || echo "CORS config may already be set" &&
      echo "CORS configuration applied successfully"
      '

volumes:
  mongodb_data:
  minio_data:
